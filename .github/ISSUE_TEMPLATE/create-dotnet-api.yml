name: "Criar API .NET"
description: "Cria uma nova API .NET baseada no template Vyracare"
title: "[create-api] nova api dotnet"
labels: ["automation", "dotnet", "api"]
body:
  - type: input
    id: api-name
    attributes:
      label: Nome da API
      description: "Informe o nome do repositório da API. Pode ser apenas o sufixo ou o nome completo em kebab-case."
      placeholder: "vyracare-api-catalog"
    validations:
      required: true

  - type: input
    id: database-name
    attributes:
      label: Nome do banco
      description: "Nome do banco/Database que será configurado no appsettings."
      placeholder: "vyracare_db"
    validations:
      required: true

  - type: input
    id: mongo-connection-string
    attributes:
      label: Mongo Connection String
      description: "Opcional. String de conexão do MongoDB para já gerar o appsettings configurado."
      placeholder: "mongodb+srv://usuario:senha@cluster.mongodb.net/?retryWrites=true&w=majority"
    validations:
      required: false

  - type: input
    id: table-name
    attributes:
      label: Nome da tabela ou collection
      description: "Nome da tabela/collection principal usada pela API."
      placeholder: "catalog_items"
    validations:
      required: true

  - type: textarea
    id: api-description
    attributes:
      label: Descrição da API
      description: "Descreva rapidamente a finalidade da nova API."
      placeholder: "API responsável por..."
    validations:
      required: true

  - type: input
    id: jwt-key
    attributes:
      label: JWT Key
      description: "Opcional. Chave JWT da API."
      placeholder: "sQAn6C4A9uMUjbXVvXGVdrHQVxYKo57x2WxEgmSFQBY="
    validations:
      required: false

  - type: input
    id: jwt-issuer
    attributes:
      label: JWT Issuer
      description: "Opcional. Issuer JWT da API."
      placeholder: "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_xxxxx"
    validations:
      required: false

  - type: input
    id: jwt-audience
    attributes:
      label: JWT Audience
      description: "Opcional. Audience JWT da API."
      placeholder: "424aitrab2nma4ttgi0314dfst"
    validations:
      required: false

  - type: input
    id: jwt-expiry-minutes
    attributes:
      label: JWT Expiry Minutes
      description: "Opcional. Tempo de expiração do token em minutos."
      placeholder: "60"
    validations:
      required: false

  - type: input
    id: consumer-mfe-repository
    attributes:
      label: Repositório do MFE consumidor
      description: "Opcional. Informe o repositório do MFE que consome a API. Ex.: vyracare/vyracare-app-user-mfe"
      placeholder: "vyracare/vyracare-app-user-mfe"
    validations:
      required: false
